services:
  api:
    environment:
      # This entrypoint uses the dedicated Mongo-backed binary.
      HTTP_PORT: "8080"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: tasks
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        API_BINARY: api-mongo
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    profiles:
      - mongo
    environment:
      MONGO_INITDB_DATABASE: tasks
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

