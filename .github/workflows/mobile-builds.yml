name: Mobile Builds

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/mobile-builds.yml"
      - "frontend/android/**"
      - "frontend/ios/**"
      - "frontend/src/**"
      - "frontend/assets/**"
      - "frontend/index.html"
      - "frontend/capacitor.config.ts"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/tsconfig*.json"
      - "frontend/svelte.config.js"
      - "frontend/vite.config.ts"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/mobile-builds.yml"
      - "frontend/android/**"
      - "frontend/ios/**"
      - "frontend/src/**"
      - "frontend/assets/**"
      - "frontend/index.html"
      - "frontend/capacitor.config.ts"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/tsconfig*.json"
      - "frontend/svelte.config.js"
      - "frontend/vite.config.ts"

jobs:
  changes:
    name: Detect mobile changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            android:
              - '.github/workflows/mobile-builds.yml'
              - 'frontend/android/**'
              - 'frontend/src/**'
              - 'frontend/assets/**'
              - 'frontend/index.html'
              - 'frontend/capacitor.config.ts'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/tsconfig*.json'
              - 'frontend/svelte.config.js'
              - 'frontend/vite.config.ts'
            ios:
              - '.github/workflows/mobile-builds.yml'
              - 'frontend/ios/**'
              - 'frontend/src/**'
              - 'frontend/assets/**'
              - 'frontend/index.html'
              - 'frontend/capacitor.config.ts'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/tsconfig*.json'
              - 'frontend/svelte.config.js'
              - 'frontend/vite.config.ts'

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.android == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build web assets
        working-directory: frontend
        run: bun run build

      - name: Sync Capacitor
        working-directory: frontend
        run: bunx cap sync android

      - name: Run Android unit tests
        working-directory: frontend/android
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

  ios:
    name: iOS
    runs-on: macos-latest
    needs: [changes]
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build web assets
        working-directory: frontend
        run: bun run build

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: bunx cap sync ios

      # ✅ Ensure CocoaPods repo is up-to-date
      - name: Update CocoaPods repos
        run: pod repo update

      # ✅ Deterministic pod install
      - name: Install CocoaPods dependencies deterministically
        working-directory: frontend/ios/App
        run: pod install --deployment --verbose

      # ✅ Verify Podfile.lock is committed and in sync
      - name: Verify Podfile.lock is committed
        working-directory: frontend/ios/App
        run: |
          if [ ! -f Podfile.lock ]; then
            echo "❌ Podfile.lock is missing. Commit it first."
            exit 1
          fi
          if ! git diff --exit-code Podfile.lock; then
            echo "❌ Podfile.lock is out of date. Run 'pod install' locally and commit changes."
            exit 1
          fi

      # ✅ Clean build first to avoid stale derived data issues
      - name: Clean Xcode build
        working-directory: frontend/ios/App
        run: |
          xcodebuild clean -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build

      # ✅ Build iOS simulator app
      - name: Build iOS simulator
        working-directory: frontend/ios/App
        run: |
          xcodebuild build -workspace App.xcworkspace -scheme App \
          -configuration Debug -sdk iphonesimulator \
          -derivedDataPath build \
          -xcconfig ../debug.xcconfig \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          ONLY_ACTIVE_ARCH=YES \
      SKIP_INSTALL=YES
