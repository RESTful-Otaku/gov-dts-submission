name: Mobile Builds

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/mobile-builds.yml"
      - "frontend/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/mobile-builds.yml"
      - "frontend/**"

jobs:
  changes:
    name: Detect mobile changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            android:
              - 'frontend/android/**'
              - 'frontend/src/**'
              - 'frontend/assets/**'
              - 'frontend/index.html'
              - 'frontend/capacitor.config.ts'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/tsconfig*.json'
              - 'frontend/svelte.config.js'
              - 'frontend/vite.config.ts'
            ios:
              - 'frontend/ios/**'
              - 'frontend/src/**'
              - 'frontend/assets/**'
              - 'frontend/index.html'
              - 'frontend/capacitor.config.ts'
              - 'frontend/package.json'
              - 'frontend/bun.lock'
              - 'frontend/tsconfig*.json'
              - 'frontend/svelte.config.js'
              - 'frontend/vite.config.ts'

  build-frontend:
    name: Build Frontend Assets
    runs-on: ubuntu-latest
    needs: [changes]
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            frontend/node_modules
            ~/.bun
          key: bun-deps-${{ hashFiles('frontend/bun.lock') }}

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build web assets
        working-directory: frontend
        run: bun run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: [changes, build-frontend]
    if: needs.changes.outputs.android == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform 36
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Sync Capacitor
        working-directory: frontend
        run: bunx cap sync android

      - name: Run Android unit tests
        working-directory: frontend/android
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Optional Android Lint
        working-directory: frontend/android
        run: ./gradlew lintDebug

  ios:
    name: iOS
    runs-on: macos-latest
    needs: [changes, build-frontend]
    if: needs.changes.outputs.ios == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            frontend/ios/App/Pods
            ~/.cocoapods/repos
          key: cocoapods-${{ hashFiles('frontend/ios/App/Podfile.lock') }}

      - name: Install CocoaPods dependencies
        working-directory: frontend/ios/App
        run: pod install --deployment --verbose

      - name: Clean Xcode build
        working-directory: frontend/ios/App
        run: |
          xcodebuild clean -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build

      - name: Build iOS simulator
        working-directory: frontend/ios/App
        run: |
          xcodebuild build -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            SKIP_INSTALL=YES

      - name: Optional iOS Tests
        working-directory: frontend/ios/App
        run: |
          xcodebuild test -workspace App.xcworkspace -scheme App \
            -configuration Debug -sdk iphonesimulator \
            -derivedDataPath build
