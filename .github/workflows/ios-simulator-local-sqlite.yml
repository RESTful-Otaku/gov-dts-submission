# Build an iOS Simulator .app bundle (local SQLite) and upload it as a workflow artifact.
# Use this from Linux: you cannot run Xcode locally; trigger workflow_dispatch in GitHub Actions
# and download the zip from the run’s Artifacts section.
name: iOS Simulator (local SQLite artifact)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-simulator-zip:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Frontend checks and tests
        working-directory: frontend
        run: |
          bun run check
          bun run test

      - name: Configure Vite env for native mobile SQLite (SQLCipher)
        shell: bash
        env:
          REPO_SECRET: ${{ secrets.VITE_MOBILE_DB_SECRET }}
        run: |
          set -euo pipefail
          echo "VITE_MOBILE_LOCAL_DB=true" >> "$GITHUB_ENV"
          if [[ -z "${REPO_SECRET}" ]]; then
            echo "::error::Required secret VITE_MOBILE_DB_SECRET is not set. Refusing to build artifact with a placeholder SQLCipher key."
            exit 1
          fi
          printf 'VITE_MOBILE_DB_SECRET=%s\n' "${REPO_SECRET}" >> "$GITHUB_ENV"

      - name: Build web assets (on-device SQLite)
        working-directory: frontend
        run: bun run build

      - name: Capacitor sync iOS
        working-directory: frontend
        run: bunx cap sync ios

      - name: Build iOS Simulator app (unsigned)
        working-directory: frontend/ios/App
        run: |
          # Align with mobile-builds / ios-release (SPM + SQLCipher — arm64 sim on Apple Silicon runners).
          xcodebuild -project App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            ARCHS=arm64 \
            'EXCLUDED_ARCHS[sdk=iphonesimulator*]'=x86_64

      - name: Zip .app for simulator
        id: zip
        shell: bash
        run: |
          APP_PATH="frontend/ios/App/build/Build/Products/Release-iphonesimulator/App.app"
          OUT_ZIP="$RUNNER_TEMP/gov-dts-ios-simulator-local-sqlite.app.zip"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found: $APP_PATH" >&2
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUT_ZIP"
          echo "zip_path=$OUT_ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-local-sqlite-app
          path: ${{ steps.zip.outputs.zip_path }}
          if-no-files-found: error
