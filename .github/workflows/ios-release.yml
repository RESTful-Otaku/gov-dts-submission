name: iOS Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release-ios:
    name: Build and Release iOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          VERSION_TAG="v${VERSION_FILE}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${VERSION_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION_FILE}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format and VERSION file
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION_FILE="${{ steps.tag.outputs.version }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag format vX.Y.Z, got: $TAG"
            exit 1
          fi
          if [[ "v${VERSION_FILE}" != "$TAG" ]]; then
            echo "VERSION mismatch: VERSION=${VERSION_FILE}, tag=${TAG}"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend checks and tests
        working-directory: frontend
        run: |
          bun run check
          bun run test

      - name: Configure Vite env for native mobile SQLite (SQLCipher)
        shell: bash
        env:
          REPO_SECRET: ${{ secrets.VITE_MOBILE_DB_SECRET }}
        run: |
          set -euo pipefail
          default="gov-dts-mobile-sqlcipher-local-dev-not-for-store"
          echo "VITE_MOBILE_LOCAL_DB=true" >> "$GITHUB_ENV"
          if [[ -n "${REPO_SECRET}" ]]; then
            printf 'VITE_MOBILE_DB_SECRET=%s\n' "${REPO_SECRET}" >> "$GITHUB_ENV"
          else
            printf 'VITE_MOBILE_DB_SECRET=%s\n' "${default}" >> "$GITHUB_ENV"
            echo "::notice::Repository secret VITE_MOBILE_DB_SECRET is not set; using the public dev placeholder. Set the secret for a production-grade SQLCipher key."
          fi

      - name: Build web assets (pre-production local DB mode)
        working-directory: frontend
        run: bun run build

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: bunx cap sync ios

      - name: Build iOS simulator app (SPM)
        working-directory: frontend/ios/App
        run: |
          # Match mobile-builds: SwiftPM + SQLCipher.xcframework — arm64 simulator only on Apple Silicon CI.
          xcodebuild -project App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            ARCHS=arm64 \
            'EXCLUDED_ARCHS[sdk=iphonesimulator*]'=x86_64

      - name: Prepare release artifact
        id: artifact
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          APP_PATH="frontend/ios/App/build/Build/Products/Release-iphonesimulator/App.app"
          OUT_ZIP="gov-case-tracker-ios-${TAG}.app.zip"
          OUT_SUM="${OUT_ZIP}.sha256"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected app bundle not found: $APP_PATH"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$OUT_ZIP"
          shasum -a 256 "$OUT_ZIP" > "$OUT_SUM"
          echo "ios_artifact=$OUT_ZIP" >> "$GITHUB_OUTPUT"
          echo "ios_checksum=$OUT_SUM" >> "$GITHUB_OUTPUT"

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: ios-source-sbom.spdx.json
          format: spdx-json

      - name: Attest iOS artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.artifact.outputs.ios_artifact }}

      - name: Create pre-release / upload iOS artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: gov-case-tracker-${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            ${{ steps.artifact.outputs.ios_artifact }}
            ${{ steps.artifact.outputs.ios_checksum }}
            ios-source-sbom.spdx.json
          body: |
            Pre-production iOS build for `${{ steps.tag.outputs.tag }}`.

            Included iOS asset:
            - `${{ steps.artifact.outputs.ios_artifact }}`
            - `${{ steps.artifact.outputs.ios_checksum }}`
            - `ios-source-sbom.spdx.json`
            - Source code archives (zip/tar.gz) generated automatically by GitHub Releases
