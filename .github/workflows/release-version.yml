# Bump VERSION + synced files, commit on the selected branch, push tag vX.Y.Z.
# Android Release / iOS Release workflows run on tag push.
name: Release — bump version and tag

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver segment to increment
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release-version-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump, commit, and tag
    runs-on: ubuntu-latest
    # Avoid accidental releases from topic branches; use the repo default branch only.
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Bump version (VERSION, mobile, OpenAPI, package.json)
        id: bump
        run: |
          set -euo pipefail
          NEW="$(node scripts/bump-version.mjs "${{ inputs.bump }}")"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Verify consistency
        shell: bash
        run: |
          set -euo pipefail
          V="$(tr -d '[:space:]' < VERSION)"
          PKG="$(node -p "require('./frontend/package.json').version")"
          OAI="$(awk '/^  version:/{print $2; exit}' backend/openapi.yaml)"
          GRADLE="$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' frontend/android/app/build.gradle | head -1)"
          if [[ "$V" != "$PKG" || "$V" != "$OAI" || "$V" != "$GRADLE" ]]; then
            echo "Version mismatch after bump: VERSION=$V package=$PKG openapi=$OAI android=$GRADLE"
            exit 1
          fi

      - name: Commit and push tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION frontend/package.json backend/openapi.yaml \
            frontend/android/app/build.gradle \
            frontend/ios/App/App.xcodeproj/project.pbxproj
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "refs/tags/v${{ steps.bump.outputs.version }}"
