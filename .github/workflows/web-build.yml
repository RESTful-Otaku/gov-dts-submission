name: Web Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "VERSION"
      - "scripts/bump-version.mjs"
      - ".github/workflows/web-build.yml"
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/e2e/**"
      - "frontend/scripts/e2e-web-servers.sh"
      - "frontend/playwright.config.ts"
      - "frontend/index.html"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/tsconfig*.json"
      - "frontend/svelte.config.js"
      - "frontend/vite.config.ts"
      - "frontend/nginx.conf"
      - "backend/**"
  pull_request:
    branches: [main, master]
    paths:
      - "VERSION"
      - "scripts/bump-version.mjs"
      - ".github/workflows/web-build.yml"
      - "frontend/src/**"
      - "frontend/tests/**"
      - "frontend/e2e/**"
      - "frontend/scripts/e2e-web-servers.sh"
      - "frontend/playwright.config.ts"
      - "frontend/index.html"
      - "frontend/package.json"
      - "frontend/bun.lock"
      - "frontend/tsconfig*.json"
      - "frontend/svelte.config.js"
      - "frontend/vite.config.ts"
      - "frontend/nginx.conf"
      - "backend/**"

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest
    env:
      CI: "true"
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO) for e2e API
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Verify version consistency
        shell: bash
        run: |
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          FRONTEND_VERSION="$(node -p "require('./frontend/package.json').version")"
          OPENAPI_VERSION="$(awk '/^  version:/{print $2; exit}' backend/openapi.yaml)"
          if [[ "$VERSION_FILE" != "$FRONTEND_VERSION" ]]; then
            echo "VERSION mismatch: VERSION=$VERSION_FILE frontend/package.json=$FRONTEND_VERSION"
            exit 1
          fi
          if [[ "$VERSION_FILE" != "$OPENAPI_VERSION" ]]; then
            echo "VERSION mismatch: VERSION=$VERSION_FILE backend/openapi.yaml=$OPENAPI_VERSION"
            exit 1
          fi
          GRADLE_VER="$(sed -n 's/.*versionName "\([^"]*\)".*/\1/p' frontend/android/app/build.gradle | head -1)"
          IOS_VER="$(grep -m1 'MARKETING_VERSION = ' frontend/ios/App/App.xcodeproj/project.pbxproj | sed -n 's/.*MARKETING_VERSION = \([^;]*\);/\1/p' | tr -d ' ')"
          if [[ "$VERSION_FILE" != "$GRADLE_VER" ]]; then
            echo "VERSION mismatch: VERSION=$VERSION_FILE android versionName=$GRADLE_VER"
            exit 1
          fi
          if [[ "$VERSION_FILE" != "$IOS_VER" ]]; then
            echo "VERSION mismatch: VERSION=$VERSION_FILE iOS MARKETING_VERSION=$IOS_VER"
            exit 1
          fi

      - name: Install, test, and build
        working-directory: frontend
        env:
          # E2E preview uses same-origin /api via Vite preview proxy; guest UI matches Playwright smoke tests.
          VITE_AUTH_REQUIRED: "false"
          VITE_API_BASE: ""
        run: |
          bun install --frozen-lockfile
          bun run check:api-types
          bun run check
          bun run check:svelte
          bun run test:coverage
          bun run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: bunx playwright install chromium --with-deps

      - name: End-to-end tests
        working-directory: frontend
        run: bun run test:e2e
