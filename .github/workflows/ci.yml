name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      # Suppress noisy upstream warnings from CGO sqlite bindings during build/tests.
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        working-directory: backend
        run: go test -v ./...

  frontend:
    name: Web Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install, test, and build
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run test
          bun run build

  android:
    name: Mobile Build / Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build web assets
        working-directory: frontend
        run: bun run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Run Android unit tests
        working-directory: frontend/android
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

  ios:
    name: Mobile Build / iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Build web assets
        working-directory: frontend
        run: bun run build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync ios

      - name: Build iOS (simulator)
        working-directory: frontend/ios/App
        run: |
          xcodebuild -project App.xcodeproj -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

  smoke-postgres:
    name: DB Smoketests / PostgreSQL
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: tasks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build API
        working-directory: backend
        run: go build -o api ./cmd/api

      - name: Run API (Postgres)
        working-directory: backend
        env:
          DB_DRIVER: pgx
          DB_DSN: postgres://postgres:postgres@localhost:5432/tasks?sslmode=disable
          HTTP_PORT: "8080"
        run: |
          ./api &
          sleep 3
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run Postgres store tests
        working-directory: backend
        env:
          POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/tasks?sslmode=disable
        run: |
          go test ./tests/storage -run 'TestPostgresStore_'

  smoke-mariadb:
    name: DB Smoketests / MariaDB
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    services:
      mariadb:
        image: mariadb:12.2.2
        env:
          MARIADB_DATABASE: tasks
          MARIADB_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build API
        working-directory: backend
        run: go build -o api ./cmd/api

      - name: Run API (MariaDB)
        working-directory: backend
        env:
          DB_DRIVER: mariadb
          DB_DSN: root:password@tcp(127.0.0.1:3306)/tasks?parseTime=true&charset=utf8mb4&loc=UTC&timeout=10s&readTimeout=5s&writeTimeout=5s
          HTTP_PORT: "8080"
        run: |
          ./api &
          sleep 3
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run MariaDB store tests
        working-directory: backend
        env:
          MARIADB_DSN: root:password@tcp(127.0.0.1:3306)/tasks?parseTime=true&charset=utf8mb4&loc=UTC&timeout=10s&readTimeout=5s&writeTimeout=5s
        run: |
          go test ./tests/storage -run 'TestMariaDBStore_'

  smoke-mongo:
    name: DB Smoketests / MongoDB
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Mongo API
        working-directory: backend
        run: go build -o api-mongo ./cmd/api-mongo

      - name: Run API (MongoDB)
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DATABASE: tasks
          HTTP_PORT: "8080"
        run: |
          ./api-mongo &
          sleep 5
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run MongoDB store tests
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DATABASE: tasks_test
        run: |
          go test ./tests/storage -run 'TestMongoStore_'

  smoke-sqlite:
    name: DB Smoketests / SQLite
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build API
        working-directory: backend
        run: go build -o api ./cmd/api

      - name: Run API (SQLite)
        working-directory: backend
        env:
          DB_DRIVER: sqlite3
          DB_DSN: file:tasks_ci.db?_foreign_keys=on&_busy_timeout=5000&cache=shared
          HTTP_PORT: "8080"
        run: |
          ./api &
          sleep 2
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run SQLite store tests
        working-directory: backend
        run: |
          go test ./tests/storage -run 'TestSQLiteStore'

