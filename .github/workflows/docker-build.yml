name: Docker Compose Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/docker-build.yml"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "frontend/nginx.conf"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/docker-build.yml"
      - "docker-compose.yml"
      - "backend/Dockerfile"
      - "frontend/Dockerfile"
      - "frontend/nginx.conf"

jobs:
  compose-build:
    name: docker compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images (API + frontend)
        run: docker compose -f docker-compose.yml build
