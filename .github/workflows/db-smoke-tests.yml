name: DB smoke tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/db-smoke-tests.yml"
      - "backend/**"
  pull_request:
    branches: [main, master]
    paths:
      - ".github/workflows/db-smoke-tests.yml"
      - "backend/**"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        working-directory: backend
        run: go test -race -count=1 -v ./...

      - name: Run go vet
        working-directory: backend
        run: go vet ./...

  postgres:
    name: PostgreSQL
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: tasks
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build API
        working-directory: backend
        run: go build -o api ./cmd/api

      - name: Run API (Postgres)
        working-directory: backend
        env:
          DB_DRIVER: pgx
          DB_DSN: postgres://postgres:postgres@localhost:5432/tasks?sslmode=disable
          HTTP_PORT: "8080"
        run: |
          ./api &
          sleep 3
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run Postgres store tests
        working-directory: backend
        env:
          POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/tasks?sslmode=disable
        run: |
          go test -count=1 ./tests/storage -run 'TestPostgresStore_'

  mariadb:
    name: MariaDB
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: tasks
          MARIADB_USER: ci
          MARIADB_PASSWORD: ci_password
          MARIADB_ROOT_PASSWORD: password
          MARIADB_ROOT_HOST: "%"
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -ppassword --connect-timeout=2 --silent || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
          --health-start-period 45s

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build API
        working-directory: backend
        run: go build -o api ./cmd/api

      - name: Run API (MariaDB)
        working-directory: backend
        env:
          DB_DRIVER: mariadb
          DB_DSN: ci:ci_password@tcp(127.0.0.1:3306)/tasks?parseTime=true&charset=utf8mb4&loc=UTC&timeout=10s&readTimeout=5s&writeTimeout=5s
          HTTP_PORT: "8080"
        run: |
          ./api &
          sleep 3
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run MariaDB store tests
        working-directory: backend
        env:
          MARIADB_DSN: ci:ci_password@tcp(127.0.0.1:3306)/tasks?parseTime=true&charset=utf8mb4&loc=UTC&timeout=10s&readTimeout=5s&writeTimeout=5s
        run: |
          go test -count=1 ./tests/storage -run 'TestMariaDBStore_'

  mongodb:
    name: MongoDB
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build Mongo API
        working-directory: backend
        run: go build -o api-mongo ./cmd/api-mongo

      - name: Run API (MongoDB)
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DATABASE: tasks
          HTTP_PORT: "8080"
        run: |
          ./api-mongo &
          sleep 5
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run MongoDB store tests
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017
          MONGO_DATABASE: tasks_test
        run: |
          go test -count=1 ./tests/storage -run 'TestMongoStore_'

  sqlite:
    name: SQLite
    runs-on: ubuntu-latest
    needs: [backend]
    env:
      CGO_CFLAGS: "-Wno-discarded-qualifiers"

    steps:
      - uses: actions/checkout@v4

      - name: Install SQLite (CGO)
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build API
        working-directory: backend
        run: go build -o api ./cmd/api

      - name: Run API (SQLite)
        working-directory: backend
        env:
          DB_DRIVER: sqlite3
          DB_DSN: file:tasks_ci.db?_foreign_keys=on&_busy_timeout=5000&cache=shared
          HTTP_PORT: "8080"
        run: |
          ./api &
          sleep 2
          curl -sf http://localhost:8080/api/ready
          curl -sf http://localhost:8080/api/tasks | head -c 200

      - name: Run SQLite store tests
        working-directory: backend
        run: |
          go test -count=1 ./tests/storage -run 'TestSQLiteStore'
