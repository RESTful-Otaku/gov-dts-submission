name: Android Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  release-android:
    name: Build and Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          VERSION_FILE="$(tr -d '[:space:]' < VERSION)"
          VERSION_TAG="v${VERSION_FILE}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${VERSION_TAG}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION_FILE}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format and VERSION file
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION_FILE="${{ steps.tag.outputs.version }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag format vX.Y.Z, got: $TAG"
            exit 1
          fi
          if [[ "v${VERSION_FILE}" != "$TAG" ]]; then
            echo "VERSION mismatch: VERSION=${VERSION_FILE}, tag=${TAG}"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: |
          yes | sdkmanager --licenses 2>/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Install frontend deps
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Run frontend checks and tests
        working-directory: frontend
        run: |
          bun run check
          bun run test

      - name: Configure Vite env for native mobile SQLite (SQLCipher)
        shell: bash
        env:
          REPO_SECRET: ${{ secrets.VITE_MOBILE_DB_SECRET }}
        run: |
          set -euo pipefail
          echo "VITE_MOBILE_LOCAL_DB=true" >> "$GITHUB_ENV"
          if [[ -z "${REPO_SECRET}" ]]; then
            echo "::error::Required secret VITE_MOBILE_DB_SECRET is not set. Refusing to build release artifact with a placeholder SQLCipher key."
            exit 1
          fi
          printf 'VITE_MOBILE_DB_SECRET=%s\n' "${REPO_SECRET}" >> "$GITHUB_ENV"

      - name: Build web assets (pre-production local DB mode)
        working-directory: frontend
        run: bun run build

      - name: Sync Capacitor Android
        working-directory: frontend
        run: bunx cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Prepare release artifact
        id: artifact
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SRC="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
          OUT="gov-case-tracker-android-${TAG}.apk"
          SUM="${OUT}.sha256"
          if [[ ! -f "$SRC" ]]; then
            echo "Expected APK not found: $SRC"
            exit 1
          fi
          cp "$SRC" "$OUT"
          sha256sum "$OUT" > "$SUM"
          echo "apk_name=$OUT" >> "$GITHUB_OUTPUT"
          echo "apk_checksum=$SUM" >> "$GITHUB_OUTPUT"

      - name: Generate source SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: android-source-sbom.spdx.json
          format: spdx-json

      - name: Attest Android artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.artifact.outputs.apk_name }}

      - name: Create pre-release / upload Android artifact
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: gov-case-tracker-${{ steps.tag.outputs.tag }}
          prerelease: true
          files: |
            ${{ steps.artifact.outputs.apk_name }}
            ${{ steps.artifact.outputs.apk_checksum }}
            android-source-sbom.spdx.json
          body: |
            Pre-production Android APK build for `${{ steps.tag.outputs.tag }}`.

            Included Android asset:
            - `${{ steps.artifact.outputs.apk_name }}`
            - `${{ steps.artifact.outputs.apk_checksum }}`
            - `android-source-sbom.spdx.json`
            - Source code archives (zip/tar.gz) generated automatically by GitHub Releases
